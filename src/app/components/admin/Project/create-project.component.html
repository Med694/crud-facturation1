<div class="page">

  <div class="form-card">

    <h2>Créer un projet</h2>

    <!-- Nom -->
    <div class="form-group">
      <label>Nom du projet</label>
      <input type="text" [(ngModel)]="formData.name" />
    </div>

    <!-- Project Manager -->
    <div class="form-group">
      <label>Project Manager</label>

      <select [(ngModel)]="formData.projectManagerId" name="pm">
  <option [ngValue]="null">-- Aucun --</option>
  <option *ngFor="let pm of projectManagers" [ngValue]="pm.id">
    {{ pm.fullName }}
  </option>
</select>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn green" (click)="submit()">Créer</button>
      <button class="btn gray" (click)="cancel()">Annuler</button>
    </div>

  </div>

</div>
