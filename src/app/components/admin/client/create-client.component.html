<div class="form-container">
  <h2>Create  Client</h2>

  <form (ngSubmit)="submit()">

    <div class="form-group">
      <label>Nom complet *</label>
      <input type="text" [(ngModel)]="formData.fullName" name="fullName">
    </div>

    <div class="form-group">
      <label>Email *</label>
      <input type="email" [(ngModel)]="formData.email" name="email">
    </div>

    <div class="form-group">
      <label>Téléphone *</label>
      <input type="text" [(ngModel)]="formData.phone" name="phone">
    </div>

    <div class="form-group">
      <label>Adresse *</label>
      <input type="text" [(ngModel)]="formData.address" name="address">
    </div>

    <div class="form-group">
      <label>Entreprise *</label>
      <input type="text" [(ngModel)]="formData.company" name="company">
    </div>

    <div class="form-group">
      <label>Projets associés *</label>
      <select multiple [(ngModel)]="selectedProjectIds" name="projectIds">
        <option *ngFor="let project of projects" [value]="project.id">
          {{ project.name }}
        </option>
      </select>
    </div>

    <button type="submit">Create</button>
  </form>
</div>
