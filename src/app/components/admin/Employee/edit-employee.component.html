<div class="form-container">
  <h2>Edit Employee</h2>

  <!-- 🔹 Full Name -->
  <div class="form-group">
    <label>Full Name</label>
    <input type="text" [(ngModel)]="formData.fullName" />
  </div>
  <!-- 🔹 Email -->
<div class="form-group">
  <label>Email</label>
  <input type="email" [(ngModel)]="formData.email" />
</div>

  <!-- 🔹 Phone -->
  <div class="form-group">
    <label>Phone Number</label>
    <input type="text" [(ngModel)]="formData.phoneNumber" />
  </div>

  <!-- 🔹 Matricule -->
  <div class="form-group">
    <label>Matricule</label>
    <input type="text" [(ngModel)]="formData.matricule" placeholder="FL1234" />
  </div>

  <!-- 🔹 City -->
  <div class="form-group">
  <label>City</label>
  <select [(ngModel)]="formData.city" name="city" class="form-control">
    <option value="">-- Choisir une ville --</option>
    <option value="Sfax">Sfax</option>
    <option value="Tunis">Tunis</option>
  </select>
</div>

  <!-- 🔹 Speciality -->
  <div class="form-group">
  <label>Speciality</label>
  <select [(ngModel)]="formData.speciality" name="speciality" class="form-control">
    <option value="">-- Choisir une spécialité --</option>
    <option value="Dev">Dev</option>
    <option value="QA">QA</option>
    <option value="BI">BI</option>
    <option value="BA">BA</option>
    <option value="Support">Support</option>
  </select>
</div>

  <!-- 🔹 Grade -->
  <div class="form-group">
  <label>Grade</label>
  <select [(ngModel)]="formData.grade" name="grade" class="form-control">
    <option value="">-- Choisir un grade --</option>
    <option value="Junior">Junior</option>
    <option value="Senior">Senior</option>
  </select>
</div>

  <!-- 🔥 Projects (Many-to-Many) -->
   <label>Assign Projects</label>
   <div class="form-group">
  <select multiple 
          [(ngModel)]="selectedProjectIds" 
          name="projects"
          class="form-control">

    <option *ngFor="let p of projects" [ngValue]="p.id">
      {{ p.name }}
    </option>

  </select>
</div>

  <!-- 🔹 Button -->
  <button (click)="submit()">Update</button>
</div>
