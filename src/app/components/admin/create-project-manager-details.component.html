<div class="form-container">
  <h2>Create Project Manager Details</h2>

  <div class="form-grid">
    
    <div class="form-group">
      <label>Full Name</label>
      <input [(ngModel)]="formData.fullName" />
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input [(ngModel)]="formData.phone" placeholder="+216" />
    </div>

    <div class="form-group">
      <label>Matricule</label>
      <input [(ngModel)]="formData.matricule" />
    </div>

    <div class="form-group">
  <label>City</label>
  <select [(ngModel)]="formData.city">
    <option value="">-- Select City --</option>
    <option value="Tunis">Tunis</option>
    <option value="Sfax">Sfax</option>
  </select>
</div>

    <div class="form-group">
      <label>Project Assign</label>
      <label>Projects</label>
<select multiple [(ngModel)]="selectedProjectIds" name="projects">
  <option *ngFor="let p of projects" [value]="p.id">
    {{ p.name }}
  </option>
</select>
    </div>

  </div>

  <button class="btn-next" (click)="submit()">Next →</button>
</div>
