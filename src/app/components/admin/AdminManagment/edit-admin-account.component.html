<div class="container">
  <div class="card">

    <h2>Modifier Admin - Compte</h2>

    <form (ngSubmit)="submit()">

      <div class="form-group">
        <label>Username</label>
        <input [(ngModel)]="formData.username" name="username" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input [(ngModel)]="formData.email" name="email" required>
      </div>

      <div class="form-group">
        <label>Nouveau mot de passe</label>
        <input [(ngModel)]="formData.password" name="password" placeholder="Optionnel">
      </div>

      <!-- 🔥 Boutons -->
      <div class="actions">
        <button type="submit">Modifier</button>
        <button type="button" class="cancel-btn" (click)="cancel()">Annuler</button>
      </div>

    </form>

  </div>
</div>
