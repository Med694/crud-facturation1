<div class="container">

  <div class="card">
    <h2>Edit Project Manager</h2>

    <div class="form-group">
      <label>Full Name</label>
      <input [(ngModel)]="formData.fullName" type="text" />
    </div>

    <div class="form-group">
      <label>City</label>
      <input [(ngModel)]="formData.city" type="text" />
    </div>

    <div class="form-group">
      <label>Phone</label>
      <input [(ngModel)]="formData.phone" type="text" />
    </div>

    <div class="form-group">
      <label>Matricule</label>
      <input [(ngModel)]="formData.matricule" type="text" />
    </div>

    <div class="form-group">
  <label>Projets</label>

  <select multiple [(ngModel)]="formData.projectIds" name="projects">
    <option *ngFor="let p of projects" [value]="p.id">
      {{ p.name }}
    </option>
  </select>
</div>

    <button (click)="submit()">Next →</button>

  </div>

</div>
